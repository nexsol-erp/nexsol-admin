name: Build and Deploy React App

on:
  push:
    branches:
      - main  # Adjust this if your main branch is different

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_DIR: /var/www/html
      TEMP_DEPLOY_DIR: /home/deploy/tmp-deploy
      SERVICE_NAME: nginx

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # Change to your preferred version

      - name: Install dependencies
        run: npm install

      - name: Build React project with heartbeat
        run: |
          echo "Starting React build with heartbeat..."
          while sleep 30; do echo "[Heartbeat] Still building..."; done &
          HEARTBEAT_PID=$!
          CI='' npm run build
          BUILD_RESULT=$?
          kill $HEARTBEAT_PID
          exit $BUILD_RESULT

      - name: Deploy build to temporary folder on server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/*"
          target: "${{ env.TEMP_DEPLOY_DIR }}/"
          strip_components: 0
          overwrite: true

      - name: Move build to /var/www/html and reload nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /var/www/html
            rm -rf /var/www/html/*
            cp -r /home/deploy/tmp-deploy/build/* /var/www/html/
            systemctl reload nginx
