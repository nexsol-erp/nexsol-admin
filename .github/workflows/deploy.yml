name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Job 1: Build POS app ─────────────────────────────────────────────────────
  build-pos:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pos-electron/package-lock.json

      - name: Configure API server in pos-config.json
        if: ${{ vars.POS_API_SERVER != '' }}
        shell: pwsh
        run: |
          $cfg = Get-Content pos-electron/pos-config.json | ConvertFrom-Json
          $cfg.apiServer = "${{ vars.POS_API_SERVER }}"
          $cfg | ConvertTo-Json | Set-Content pos-electron/pos-config.json
          Write-Host "API server set to: ${{ vars.POS_API_SERVER }}"

      - name: Install pos-electron dependencies
        working-directory: pos-electron
        run: npm install

      - name: Build Cashier POS installer
        working-directory: pos-electron
        run: npm run dist:win

      - name: Upload POS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pos-installer
          path: pos-electron/release/*.exe
          retention-days: 7

  # ── Job 2: Deploy everything ─────────────────────────────────────────────────
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [build-pos]

    env:
      TEMP_DEPLOY_DIR: /home/deploy/tmp-deploy
      UPDATE_ASSETS_DIR: ${{ vars.UPDATE_ASSETS_DIR || '/home/deploy/tradelink-pos' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Extract POS version from package.json
        id: pos-ver
        run: echo "version=$(node -p "require('./pos-electron/package.json').version")" >> $GITHUB_OUTPUT

      - name: Download POS artifact
        uses: actions/download-artifact@v4
        with:
          name: pos-installer
          path: public/downloads/

      - name: Fix file permissions
        run: |
          chmod 644 "public/downloads/TradeLink247-POS-${{ steps.pos-ver.outputs.version }}.exe"
          chmod 644 "public/downloads/TradeLink247-POS-Setup-${{ steps.pos-ver.outputs.version }}.exe"

      - name: Prepare folders on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ${{ env.UPDATE_ASSETS_DIR }}/windows
            chmod -R 775 ${{ env.UPDATE_ASSETS_DIR }}/windows

      - name: Deploy portable POS exe
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "public/downloads/TradeLink247-POS-${{ steps.pos-ver.outputs.version }}.exe"
          target: "${{ env.UPDATE_ASSETS_DIR }}/windows/"
          strip_components: 2
          overwrite: true

      - name: Deploy POS full installer
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "public/downloads/TradeLink247-POS-Setup-${{ steps.pos-ver.outputs.version }}.exe"
          target: "${{ env.UPDATE_ASSETS_DIR }}/windows/"
          strip_components: 2
          overwrite: true

      - name: Update latest.txt on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ steps.pos-ver.outputs.version }}" > ${{ env.UPDATE_ASSETS_DIR }}/latest.txt
            echo "Deployed v${{ steps.pos-ver.outputs.version }}"
            ls -lh ${{ env.UPDATE_ASSETS_DIR }}/windows/

      - name: Install dependencies
        run: npm install

      - name: Build React project with heartbeat
        run: |
          echo "Starting React build..."
          while sleep 30; do echo "[Heartbeat] Still building..."; done &
          HEARTBEAT_PID=$!
          CI='' npm run build
          BUILD_RESULT=$?
          kill $HEARTBEAT_PID
          exit $BUILD_RESULT

      - name: Deploy build to temporary folder on server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/*"
          target: "${{ env.TEMP_DEPLOY_DIR }}/"
          strip_components: 0
          overwrite: true

      - name: Move build to /var/www/html and reload nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /var/www/html
            sudo rm -rf /var/www/html/*
            sudo cp -r /home/deploy/tmp-deploy/build/* /var/www/html/
            sudo systemctl reload nginx
