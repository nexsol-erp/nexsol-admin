version: "3.8"

# NexSol Local AI Stack
# ─────────────────────
# CPU-only:  docker compose -f docker-compose.ai.yml up -d
# With GPU:  uncomment the `deploy` section below, then run the same command
#
# Pull model after first start:
#   docker exec nexsol-ollama ollama pull qwen2.5-coder:7b
#
# Test the model:
#   curl http://localhost:11434/api/generate -d '{"model":"qwen2.5-coder:7b","prompt":"SELECT 1","stream":false}'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: nexsol-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

    # ── GPU support (uncomment if you have an NVIDIA GPU) ──────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Optional: pull the model automatically on startup
  ollama-init:
    image: curlimages/curl:latest
    container_name: nexsol-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Pulling qwen2.5-coder:7b (4.7 GB — first run only)...' &&
        curl -s -X POST http://ollama:11434/api/pull
          -H 'Content-Type: application/json'
          -d '{\"name\":\"qwen2.5-coder:7b\",\"stream\":false}' &&
        echo 'Model ready.'
      "
    restart: "no"

volumes:
  ollama_models:
    name: nexsol-ollama-models
