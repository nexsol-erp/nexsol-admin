<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
<title>TradeLink247 POS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b3a75;
    color: #f8fafc;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    overflow: hidden;
  }

  .logo { font-size: 28px; font-weight: 800; letter-spacing: 1px; margin-bottom: 6px; }
  .tagline { font-size: 13px; opacity: 0.6; margin-bottom: 40px; }

  /* ── States ── */
  .state { display: none; flex-direction: column; align-items: center; text-align: center; }
  .state.active { display: flex; }

  /* Checking */
  #state-checking .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #state-checking p { font-size: 14px; opacity: 0.7; }

  /* Update available */
  #state-update { gap: 12px; }
  #state-update .badge {
    padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .badge-optional { background: #16a34a; }
  .badge-required  { background: #b45309; }
  .badge-obsolete  { background: #b91c1c; }

  #state-update .version-info { font-size: 22px; font-weight: 700; }
  #state-update .notes {
    font-size: 13px; opacity: 0.75; max-width: 320px;
    line-height: 1.5; max-height: 80px; overflow-y: auto;
  }
  #state-update .file-info { font-size: 12px; opacity: 0.5; }
  .btn-row { display: flex; gap: 10px; margin-top: 8px; }
  button {
    padding: 9px 22px; border-radius: 6px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  .btn-primary { background: #fff; color: #0b3a75; }
  .btn-secondary { background: rgba(255,255,255,0.15); color: #fff; }
  .btn-ghost { background: transparent; color: rgba(255,255,255,0.5); font-size: 13px; padding: 6px 14px; }

  /* Downloading */
  #state-download { gap: 16px; width: 320px; }
  #state-download p { font-size: 14px; opacity: 0.8; }
  .progress-bar-bg {
    width: 100%; height: 8px; background: rgba(255,255,255,0.15);
    border-radius: 4px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: #fff; border-radius: 4px;
    width: 0%; transition: width 0.2s ease;
  }
  .progress-pct { font-size: 13px; opacity: 0.6; }

  /* Launching */
  #state-launching { gap: 12px; }
  #state-launching .spinner {
    width: 28px; height: 28px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #state-launching p { font-size: 14px; opacity: 0.7; }

  /* Error */
  #state-error { gap: 12px; }
  #state-error .err-icon { font-size: 36px; }
  #state-error .err-msg { font-size: 14px; opacity: 0.8; max-width: 300px; line-height: 1.5; }

  /* Version watermark */
  .watermark { position: fixed; bottom: 14px; right: 16px; font-size: 11px; opacity: 0.3; }
</style>
</head>
<body>
  <div class="logo">TradeLink247 POS</div>
  <div class="tagline">Loading…</div>

  <!-- Checking for updates -->
  <div id="state-checking" class="state active">
    <div class="spinner"></div>
    <p>Checking for updates…</p>
  </div>

  <!-- Update available dialog -->
  <div id="state-update" class="state">
    <span id="update-badge" class="badge badge-optional">Optional Update</span>
    <div class="version-info">Version <span id="update-version"></span> available</div>
    <div id="update-notes" class="notes"></div>
    <div id="update-size" class="file-info"></div>
    <div class="btn-row" id="update-buttons">
      <button class="btn-primary" id="btn-download">Download &amp; Update</button>
      <button class="btn-secondary" id="btn-later">Later</button>
      <button class="btn-ghost" id="btn-skip">Skip</button>
    </div>
  </div>

  <!-- Downloading -->
  <div id="state-download" class="state">
    <p id="dl-label">Downloading update…</p>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="progress-pct" id="progress-pct">0%</div>
  </div>

  <!-- Launching -->
  <div id="state-launching" class="state">
    <div class="spinner"></div>
    <p>Starting POS…</p>
  </div>

  <!-- Error -->
  <div id="state-error" class="state">
    <div class="err-icon">⚠</div>
    <div class="err-msg" id="error-msg">An error occurred.</div>
    <div class="btn-row">
      <button class="btn-primary" id="btn-retry">Retry</button>
      <button class="btn-secondary" id="btn-launch-anyway">Launch Anyway</button>
    </div>
  </div>

  <div class="watermark" id="watermark"></div>

  <script>
    const { ipcRenderer } = require("electron");

    function show(stateId) {
      document.querySelectorAll(".state").forEach(el => el.classList.remove("active"));
      document.getElementById(stateId).classList.add("active");
    }

    function fmtBytes(b) {
      if (!b) return "";
      if (b < 1024 * 1024) return (b / 1024).toFixed(1) + " KB";
      return (b / (1024 * 1024)).toFixed(1) + " MB";
    }

    ipcRenderer.on("launcher:version", (_, v) => {
      document.getElementById("watermark").textContent = "v" + v;
    });

    ipcRenderer.on("launcher:state", (_, { state, data }) => {
      show("state-" + state);

      if (state === "update") {
        const { updateType, latestVersion, releaseNotes, fileSize, reason } = data;
        const isObsolete = reason === "CURRENT_VERSION_OBSOLETE";
        const isRequired = updateType === "REQUIRED" || isObsolete;

        const badge = document.getElementById("update-badge");
        badge.textContent = isObsolete ? "Obsolete Version" : isRequired ? "Required Update" : "Optional Update";
        badge.className = "badge " + (isObsolete ? "badge-obsolete" : isRequired ? "badge-required" : "badge-optional");

        document.getElementById("update-version").textContent = latestVersion;
        const notesEl = document.getElementById("update-notes");
        notesEl.textContent = releaseNotes || "";
        notesEl.style.display = releaseNotes ? "block" : "none";
        document.getElementById("update-size").textContent =
          fileSize ? "Download size: " + fmtBytes(fileSize) : "";

        const btnLater = document.getElementById("btn-later");
        const btnSkip  = document.getElementById("btn-skip");
        if (isRequired || isObsolete) {
          btnLater.style.display = "none";
          btnSkip.style.display  = "none";
        } else {
          btnLater.style.display = "";
          btnSkip.style.display  = "";
        }
      }

      if (state === "error") {
        document.getElementById("error-msg").textContent = data?.message || "An error occurred.";
        const btnLaunch = document.getElementById("btn-launch-anyway");
        btnLaunch.style.display = data?.canLaunch ? "" : "none";
      }
    });

    ipcRenderer.on("launcher:progress", (_, pct) => {
      document.getElementById("progress-fill").style.width = pct + "%";
      document.getElementById("progress-pct").textContent = pct + "%";
      document.getElementById("dl-label").textContent =
        pct < 100 ? "Downloading update…" : "Verifying…";
    });

    document.getElementById("btn-download").addEventListener("click", () => {
      ipcRenderer.send("user:download");
    });
    document.getElementById("btn-later").addEventListener("click", () => {
      ipcRenderer.send("user:later");
    });
    document.getElementById("btn-skip").addEventListener("click", () => {
      ipcRenderer.send("user:skip");
    });
    document.getElementById("btn-retry").addEventListener("click", () => {
      ipcRenderer.send("user:retry");
    });
    document.getElementById("btn-launch-anyway").addEventListener("click", () => {
      ipcRenderer.send("user:launch-anyway");
    });
  </script>
</body>
</html>
